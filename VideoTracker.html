<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Tracker — Physics Analysis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
}

/* ── TOOLBAR ── */
#toolbar {
    background: #16213e;
    padding: 7px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #0f3460;
    flex-wrap: wrap;
    flex-shrink: 0;
}
.tb-sep { width: 1px; height: 26px; background: #0f3460; margin: 0 2px; }
.tb-group { display: flex; align-items: center; gap: 6px; }
label.tb-label { font-size: 12px; color: #aaa; white-space: nowrap; }

button {
    padding: 4px 11px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: #0f3460;
    color: #eee;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
    white-space: nowrap;
}
button:hover:not(:disabled) { background: #1a4a8a; }
button.active { background: #e94560; border-color: #c73050; }
button:disabled { opacity: 0.35; cursor: not-allowed; }

input[type=number] {
    width: 62px; padding: 3px 6px;
    border: 1px solid #0f3460; border-radius: 4px;
    background: #0a0a1a; color: #eee; font-size: 13px;
}
input[type=range] {
    width: 100px; cursor: pointer; accent-color: #e94560;
}
select {
    padding: 3px 6px;
    border: 1px solid #0f3460; border-radius: 4px;
    background: #0a0a1a; color: #eee; font-size: 13px;
}

/* ── MAIN ── */
#main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
}

/* ── VIDEO PANEL ── */
#video-panel {
    flex: 1;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
#canvas-container {
    position: relative;
    flex-shrink: 0;
}
#video-canvas { display: block; }
#overlay-canvas {
    position: absolute;
    top: 0; left: 0;
}

#drop-hint {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #444;
    pointer-events: none;
    gap: 10px;
}
#drop-hint .icon { font-size: 52px; }
#drop-hint .text { font-size: 15px; }
#drop-hint .sub  { font-size: 12px; color: #333; }

/* ── RIGHT PANEL ── */
#right-panel {
    width: 360px;
    min-width: 300px;
    background: #0d1117;
    border-left: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#graph-header {
    padding: 8px 10px 4px;
    flex-shrink: 0;
}
#graph-header h3 { font-size: 13px; color: #aaa; text-align: center; margin-bottom: 4px; }
.legend {
    display: flex; gap: 14px; justify-content: center;
    font-size: 12px; color: #ccc;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch { width: 14px; height: 3px; border-radius: 2px; }

#graph-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
}
#graph-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

#data-section {
    flex-shrink: 0;
    border-top: 1px solid #0f3460;
    max-height: 130px;
    overflow-y: auto;
}
table { width: 100%; border-collapse: collapse; font-size: 11px; }
thead th {
    background: #16213e; padding: 3px 7px;
    text-align: right; color: #aaa;
    position: sticky; top: 0; z-index: 1;
}
thead th:first-child { text-align: left; }
tbody td { padding: 2px 7px; text-align: right; border-bottom: 1px solid #1a1a2e; }
tbody td:first-child { text-align: left; }
tbody tr:hover { background: #131c2e; }

/* ── STATUS BAR ── */
#status-bar {
    background: #16213e;
    padding: 3px 12px;
    border-top: 1px solid #0f3460;
    display: flex;
    gap: 18px;
    font-size: 11px;
    color: #666;
    flex-shrink: 0;
}
.st-item b { color: #ddd; font-weight: normal; }

/* ── MODAL ── */
#modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 8px;
    padding: 24px 28px;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}
#modal-box h4 { font-size: 15px; color: #eee; }
#modal-box p  { font-size: 13px; color: #aaa; line-height: 1.5; }
#modal-input {
    padding: 6px 10px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: #0a0a1a;
    color: #eee;
    font-size: 14px;
    width: 100%;
}
.modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- ═══ TOOLBAR ═══ -->
<div id="toolbar">
    <div class="tb-group">
        <button id="btn-load" onclick="document.getElementById('file-input').click()">&#128194; Load Video</button>
        <input type="file" id="file-input" accept="video/*" style="display:none">
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group">
        <label class="tb-label">FPS:</label>
        <input type="number" id="fps-input" value="30" min="1" max="240" step="0.001">
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group">
        <button id="btn-setup" class="active" onclick="setMode('setup')">&#9881; Setup</button>
        <button id="btn-cal"   onclick="setMode('calibration')" disabled>&#128207; Calibrate</button>
        <button id="btn-track" onclick="setMode('tracking')"    disabled>&#127919; Track</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group">
        <label class="tb-label">Axis&nbsp;angle:</label>
        <input type="range" id="angle-slider" min="-180" max="180" value="0">
        <input type="number" id="angle-num" value="0" min="-180" max="180" step="0.5" style="width:58px">
        <label class="tb-label">&#176;</label>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group">
        <label class="tb-label">Unit:</label>
        <select id="unit-sel"><option value="cm">cm</option><option value="m">m</option></select>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group">
        <button id="btn-undo"   onclick="undoLastPoint()" disabled>&#8630; Undo</button>
        <button id="btn-clear"  onclick="clearTracking()"  disabled>&#128465; Clear</button>
        <button id="btn-export" onclick="exportCSV()"      disabled>&#11015; CSV</button>
    </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="main">

    <!-- Left: video + overlay -->
    <div id="video-panel"
         ondragover="event.preventDefault();this.style.outline='2px solid #e94560'"
         ondragleave="this.style.outline=''"
         ondrop="handleDrop(event)">
        <div id="canvas-container">
            <canvas id="video-canvas"></canvas>
            <canvas id="overlay-canvas"></canvas>
        </div>
        <div id="drop-hint">
            <div class="icon">&#127909;</div>
            <div class="text">Load or drop a video file</div>
            <div class="sub">Supported: MP4, MOV, WebM, AVI…</div>
        </div>
    </div>

    <!-- Right: graph + table -->
    <div id="right-panel">
        <div id="graph-header">
            <h3>Position vs. Time</h3>
            <div class="legend">
                <div class="legend-item"><div class="legend-swatch" style="background:#e94560"></div>X(t)</div>
                <div class="legend-item"><div class="legend-swatch" style="background:#4fc3f7"></div>Y(t)</div>
            </div>
        </div>
        <div id="graph-wrap">
            <canvas id="graph-canvas"></canvas>
        </div>
        <div id="data-section">
            <table>
                <thead><tr><th>#</th><th>t (s)</th><th id="th-x">X</th><th id="th-y">Y</th></tr></thead>
                <tbody id="data-tbody"></tbody>
            </table>
        </div>
    </div>

</div>

<!-- ═══ STATUS BAR ═══ -->
<div id="status-bar">
    <div class="st-item">Frame: <b id="st-frame">—</b></div>
    <div class="st-item">Time: <b id="st-time">—</b></div>
    <div class="st-item">Mode: <b id="st-mode">Setup</b></div>
    <div class="st-item">Scale: <b id="st-scale">Not calibrated</b></div>
    <div class="st-item">Cursor: <b id="st-cursor">—</b></div>
    <div class="st-item">Points: <b id="st-pts">0</b></div>
</div>

<!-- ═══ CALIBRATION MODAL ═══ -->
<div id="modal-overlay">
    <div id="modal-box">
        <h4>&#128207; Distance Calibration</h4>
        <p id="modal-info">Enter the real-world distance between the two points you placed:</p>
        <input type="number" id="modal-input" placeholder="e.g. 100" min="0.0001" step="any">
        <div class="modal-buttons">
            <button onclick="cancelCalibration()" style="background:#222">Cancel</button>
            <button onclick="confirmCalibration()" style="background:#0f3460">Confirm</button>
        </div>
    </div>
</div>

<!-- Hidden video source -->
<video id="hv" style="display:none" preload="auto"></video>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const S = {
    mode: 'setup',        // 'setup' | 'calibration' | 'tracking'
    fps:  30,
    frameIndex: 0,
    videoLoaded: false,
    videoDuration: 0,

    // Coordinate system
    origin: { x: 200, y: 200 },
    angle: 0,             // radians — CCW rotation of axes (standard math)
    scale: 1,             // pixels per real unit (after calibration)
    unit: 'cm',
    calibrated: false,

    // Calibration
    calPts: [],           // [{x,y}] canvas coords, max 2
    calDist: 0,           // real-world distance user entered

    // Tracking
    points: [],           // [{frame, time, cx, cy, wx, wy}]

    // Interaction
    dragging: false,
    lastCursorPos: null,

    // Canvas size
    CW: 640, CH: 480,
};

// ═══════════════════════════════════════════════════════
//  ELEMENT REFERENCES
// ═══════════════════════════════════════════════════════
const video     = document.getElementById('hv');
const vcan      = document.getElementById('video-canvas');
const ocan      = document.getElementById('overlay-canvas');
const gcan      = document.getElementById('graph-canvas');
const vctx      = vcan.getContext('2d');
const octx      = ocan.getContext('2d');
const gctx      = gcan.getContext('2d');
const dropHint  = document.getElementById('drop-hint');
const container = document.getElementById('canvas-container');
const videoPanel = document.getElementById('video-panel');

// ═══════════════════════════════════════════════════════
//  VIDEO LOADING
// ═══════════════════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
});
function handleDrop(e) {
    e.preventDefault();
    videoPanel.style.outline = '';
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('video/')) loadFile(f);
}
function loadFile(file) {
    video.src = URL.createObjectURL(file);
    video.load();
    video.addEventListener('loadedmetadata', initVideo, { once: true });
}

function initVideo() {
    S.videoLoaded    = true;
    S.videoDuration  = video.duration;
    S.fps            = parseFloat(document.getElementById('fps-input').value) || 30;
    S.frameIndex     = 0;

    // Size canvas to fit panel (keep aspect ratio)
    const maxW = videoPanel.clientWidth  - 4;
    const maxH = videoPanel.clientHeight - 4;
    const ratio = video.videoWidth / video.videoHeight;
    let w = video.videoWidth, h = video.videoHeight;
    if (w > maxW) { w = maxW; h = w / ratio; }
    if (h > maxH) { h = maxH; w = h * ratio; }
    S.CW = Math.round(w);
    S.CH = Math.round(h);

    vcan.width  = ocan.width  = S.CW;
    vcan.height = ocan.height = S.CH;
    container.style.width  = S.CW + 'px';
    container.style.height = S.CH + 'px';

    S.origin = { x: S.CW / 2, y: S.CH / 2 };
    dropHint.style.display = 'none';

    document.getElementById('btn-cal').disabled   = false;
    document.getElementById('btn-track').disabled = false;

    seekTo(0);
}

function seekTo(frameIdx) {
    S.frameIndex = frameIdx;
    const t = frameIdx / S.fps;
    if (t > S.videoDuration) return;
    video.currentTime = t;
    video.addEventListener('seeked', onSeeked, { once: true });
}
function onSeeked() {
    vctx.drawImage(video, 0, 0, S.CW, S.CH);
    drawOverlay();
    updateStatus();
}

// ═══════════════════════════════════════════════════════
//  TOOLBAR CONTROLS
// ═══════════════════════════════════════════════════════
document.getElementById('fps-input').addEventListener('change', e => {
    S.fps = parseFloat(e.target.value) || 30;
});
document.getElementById('angle-slider').addEventListener('input', e => {
    const deg = parseFloat(e.target.value);
    document.getElementById('angle-num').value = deg;
    S.angle = deg * Math.PI / 180;
    drawOverlay();
});
document.getElementById('angle-num').addEventListener('change', e => {
    let deg = parseFloat(e.target.value) || 0;
    deg = Math.max(-180, Math.min(180, deg));
    document.getElementById('angle-slider').value = deg;
    document.getElementById('angle-num').value = deg;
    S.angle = deg * Math.PI / 180;
    drawOverlay();
});
document.getElementById('unit-sel').addEventListener('change', e => {
    S.unit = e.target.value;
    updateTableHeader();
    drawGraph();
    updateStatus();
});

// ═══════════════════════════════════════════════════════
//  MODE SWITCHING
// ═══════════════════════════════════════════════════════
function setMode(mode) {
    S.mode = mode;
    ['setup','cal','track'].forEach(m =>
        document.getElementById('btn-' + m).classList.remove('active')
    );
    document.getElementById('btn-' + (mode === 'calibration' ? 'cal' : mode === 'tracking' ? 'track' : 'setup')).classList.add('active');

    if (mode === 'calibration') S.calPts = [];

    document.getElementById('st-mode').textContent =
        mode === 'setup'       ? 'Setup Axis'                    :
        mode === 'calibration' ? 'Calibration — click 2 points'  :
                                 'Tracking — click on object';
    drawOverlay();
}

// ═══════════════════════════════════════════════════════
//  COORDINATE TRANSFORMS
//
//  Convention:
//    angle = 0  →  X right, Y up  (physics standard, Y-flipped from canvas)
//    positive angle = CCW rotation of the axes
//
//  canvasToWorld:  (px,py) canvas → (wx,wy) world
//  worldToCanvas:  (wx,wy) world  → (px,py) canvas
// ═══════════════════════════════════════════════════════
function canvasToWorld(px, py) {
    const dx =  (px - S.origin.x);
    const dy = -(py - S.origin.y);       // flip Y: up on screen → positive
    const c = Math.cos(S.angle), s = Math.sin(S.angle);
    return {
        x: ( dx * c + dy * s) / S.scale,
        y: (-dx * s + dy * c) / S.scale,
    };
}
function worldToCanvas(wx, wy) {
    const c = Math.cos(S.angle), s = Math.sin(S.angle);
    const dx    = (wx * c - wy * s) * S.scale;
    const dyStd = (wx * s + wy * c) * S.scale;
    return {
        x: S.origin.x + dx,
        y: S.origin.y - dyStd,  // flip back
    };
}

// ═══════════════════════════════════════════════════════
//  MOUSE EVENTS
// ═══════════════════════════════════════════════════════
function canvasPos(e) {
    const r = ocan.getBoundingClientRect();
    return {
        x: (e.clientX - r.left) * (ocan.width  / r.width),
        y: (e.clientY - r.top)  * (ocan.height / r.height),
    };
}
function dist2(a, b) {
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

ocan.addEventListener('mousedown', e => {
    if (!S.videoLoaded) return;
    const p = canvasPos(e);

    if (S.mode === 'setup') {
        if (dist2(p, S.origin) < 14) {
            S.dragging = true;
        }
    } else if (S.mode === 'calibration') {
        if (S.calPts.length >= 2) S.calPts = [];
        S.calPts.push({ x: p.x, y: p.y });
        if (S.calPts.length === 2) openCalModal();
        drawOverlay();
    } else if (S.mode === 'tracking') {
        if (!S.videoLoaded) return;
        addTrackPoint(p);
    }
});
ocan.addEventListener('mousemove', e => {
    if (!S.videoLoaded) return;
    const p = canvasPos(e);
    S.lastCursorPos = p;

    if (S.dragging) {
        S.origin = { x: p.x, y: p.y };
        drawOverlay();
    }

    // Cursor hint in setup mode
    ocan.style.cursor = (S.mode === 'setup' && dist2(p, S.origin) < 14) ? 'move' : 'crosshair';

    // Status bar cursor coordinates
    const w = canvasToWorld(p.x, p.y);
    document.getElementById('st-cursor').textContent =
        `X=${w.x.toFixed(2)} Y=${w.y.toFixed(2)} ${S.unit}`;
});
ocan.addEventListener('mouseup', () => { S.dragging = false; });
ocan.addEventListener('mouseleave', () => {
    S.dragging = false;
    S.lastCursorPos = null;
    document.getElementById('st-cursor').textContent = '—';
});

// ═══════════════════════════════════════════════════════
//  CALIBRATION
// ═══════════════════════════════════════════════════════
function openCalModal() {
    const px = dist2(S.calPts[0], S.calPts[1]).toFixed(1);
    document.getElementById('modal-info').textContent =
        `Pixel distance: ${px} px.  Enter the real-world distance in ${S.unit}:`;
    document.getElementById('modal-input').value = '';
    document.getElementById('modal-input').placeholder = `distance in ${S.unit}`;
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('modal-input').focus(), 50);
}
function cancelCalibration() {
    document.getElementById('modal-overlay').classList.remove('open');
    S.calPts = [];
    drawOverlay();
}
function confirmCalibration() {
    const val = parseFloat(document.getElementById('modal-input').value);
    if (!val || val <= 0) { alert('Enter a valid positive number.'); return; }

    const px = dist2(S.calPts[0], S.calPts[1]);
    S.scale = px / val;
    S.calDist = val;
    S.calibrated = true;

    document.getElementById('modal-overlay').classList.remove('open');
    updateStatus();
    drawOverlay();

    // Offer to switch to tracking
    setTimeout(() => {
        if (confirm(`Calibration set: ${px.toFixed(1)} px = ${val} ${S.unit}\n\nSwitch to Tracking mode now?`))
            setMode('tracking');
    }, 80);
}
// Allow Enter key in modal
document.getElementById('modal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmCalibration();
    if (e.key === 'Escape') cancelCalibration();
});

// ═══════════════════════════════════════════════════════
//  TRACKING
// ═══════════════════════════════════════════════════════
function addTrackPoint(p) {
    const world = canvasToWorld(p.x, p.y);
    S.points.push({
        frame: S.frameIndex,
        time:  S.frameIndex / S.fps,
        cx: p.x, cy: p.y,
        wx: world.x, wy: world.y,
    });
    document.getElementById('btn-undo').disabled  = false;
    document.getElementById('btn-clear').disabled = false;
    document.getElementById('btn-export').disabled= false;

    updateDataTable();
    drawOverlay();
    drawGraph();
    updateStatus();

    // Advance one frame
    const next = S.frameIndex + 1;
    if (next / S.fps > S.videoDuration) {
        alert('End of video reached.');
        return;
    }
    seekTo(next);
}

function undoLastPoint() {
    if (!S.points.length) return;
    const last = S.points.pop();
    seekTo(last.frame);  // go back to that frame
    if (!S.points.length) {
        document.getElementById('btn-undo').disabled  = true;
        document.getElementById('btn-clear').disabled = true;
        document.getElementById('btn-export').disabled= true;
    }
    updateDataTable();
    drawGraph();
    updateStatus();
}

function clearTracking() {
    if (!confirm('Clear all tracking points?')) return;
    S.points = [];
    document.getElementById('btn-undo').disabled  = true;
    document.getElementById('btn-clear').disabled = true;
    document.getElementById('btn-export').disabled= true;
    document.getElementById('data-tbody').innerHTML = '';
    drawOverlay();
    drawGraph();
    updateStatus();
}

function exportCSV() {
    const u = S.unit;
    let csv = `frame,time_s,X_${u},Y_${u}\n`;
    S.points.forEach(p =>
        csv += `${p.frame},${p.time.toFixed(4)},${p.wx.toFixed(4)},${p.wy.toFixed(4)}\n`
    );
    const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([csv], { type: 'text/csv' })),
        download: 'tracking_data.csv'
    });
    a.click();
}

// ═══════════════════════════════════════════════════════
//  OVERLAY DRAWING
// ═══════════════════════════════════════════════════════
function drawOverlay() {
    octx.clearRect(0, 0, S.CW, S.CH);
    if (!S.videoLoaded) return;
    drawAxes();
    if (S.mode === 'calibration') drawCalibration();
    drawTrackPoints();
}

function drawAxes() {
    const { origin: O, scale: sc } = S;
    const FAR = Math.max(S.CW, S.CH) * 2;
    const unit = FAR / sc;  // far distance in world units

    // Full axis lines (dashed)
    octx.save();
    octx.setLineDash([6, 6]);
    octx.lineWidth = 1;
    drawAxisLine('#e94560',  unit,    0, -unit,    0, 0.45); // X axis
    drawAxisLine('#4fc3f7',  0,  unit,  0, -unit, 0.45); // Y axis
    octx.setLineDash([]);

    // Solid arrows (60 px)
    const ARROW = 60 / sc;
    drawSolidArrow(O, worldToCanvas( ARROW, 0), '#e94560', 'X');
    drawSolidArrow(O, worldToCanvas(-ARROW, 0), '#e94560', null, true);
    drawSolidArrow(O, worldToCanvas(0,  ARROW), '#4fc3f7', 'Y');
    drawSolidArrow(O, worldToCanvas(0, -ARROW), '#4fc3f7', null, true);

    // Tick marks if calibrated
    if (S.calibrated) drawTicks();

    // Origin circle
    octx.fillStyle = '#fff';
    octx.beginPath();
    octx.arc(O.x, O.y, 5, 0, Math.PI * 2);
    octx.fill();
    octx.strokeStyle = S.mode === 'setup' ? '#ffd700' : '#aaa';
    octx.lineWidth = 2;
    octx.stroke();

    if (S.mode === 'setup') {
        octx.fillStyle = 'rgba(255,215,0,0.5)';
        octx.beginPath();
        octx.arc(O.x, O.y, 12, 0, Math.PI * 2);
        octx.fill();
        // tooltip
        octx.fillStyle = '#ffd700';
        octx.font = '11px sans-serif';
        octx.textAlign = 'left';
        octx.textBaseline = 'bottom';
        octx.fillText('drag origin', O.x + 14, O.y - 6);
    }
    octx.restore();
}

function drawAxisLine(color, wx1, wy1, wx2, wy2, alpha) {
    const a = worldToCanvas(wx1, wy1);
    const b = worldToCanvas(wx2, wy2);
    octx.strokeStyle = hexToRGBA(color, alpha);
    octx.beginPath();
    octx.moveTo(a.x, a.y);
    octx.lineTo(b.x, b.y);
    octx.stroke();
}

function drawSolidArrow(from, to, color, label, noHead) {
    octx.strokeStyle = color;
    octx.lineWidth = 2.5;
    octx.beginPath();
    octx.moveTo(from.x, from.y);
    octx.lineTo(to.x, to.y);
    octx.stroke();

    if (!noHead) {
        const ang = Math.atan2(to.y - from.y, to.x - from.x);
        octx.fillStyle = color;
        octx.beginPath();
        octx.moveTo(to.x, to.y);
        octx.lineTo(to.x - 10 * Math.cos(ang - Math.PI/6), to.y - 10 * Math.sin(ang - Math.PI/6));
        octx.lineTo(to.x - 10 * Math.cos(ang + Math.PI/6), to.y - 10 * Math.sin(ang + Math.PI/6));
        octx.closePath();
        octx.fill();
    }
    if (label) {
        const lp = worldToCanvas(
            label === 'X' ? 75 / S.scale : 0,
            label === 'Y' ? 75 / S.scale : 0
        );
        octx.fillStyle = color;
        octx.font = 'bold 14px sans-serif';
        octx.textAlign = 'center';
        octx.textBaseline = 'middle';
        octx.fillText(label, lp.x, lp.y);
    }
}

function drawTicks() {
    // Draw small tick marks every N units along each axis
    const sc = S.scale;  // px per unit
    // Choose tick spacing so we get ~5-10 ticks visible
    const visibleUnits = Math.max(S.CW, S.CH) / sc;
    const rough = visibleUnits / 8;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    let step = mag;
    if (rough / mag > 5) step = mag * 5;
    else if (rough / mag > 2) step = mag * 2;

    const maxTicks = Math.ceil(Math.max(S.CW, S.CH) / sc / step) + 1;
    const TICK = 5;
    octx.lineWidth = 1;

    for (let i = -maxTicks; i <= maxTicks; i++) {
        if (i === 0) continue;
        const v = i * step;
        const label = Math.abs(v) < 1e-9 ? '0' :
                      (Math.abs(v) >= 1000 || Math.abs(v) < 0.01 ? v.toExponential(1) : +v.toPrecision(4) + '');

        // X axis tick
        const px = worldToCanvas(v, 0);
        const perpX = worldToCanvas(v, TICK / sc);
        octx.strokeStyle = 'rgba(233,69,96,0.6)';
        octx.beginPath();
        octx.moveTo(px.x - (perpX.x - px.x), px.y - (perpX.y - px.y));
        octx.lineTo(perpX.x, perpX.y);
        octx.stroke();
        // tick label
        octx.fillStyle = 'rgba(233,69,96,0.8)';
        octx.font = '10px sans-serif';
        octx.textAlign = 'center';
        octx.textBaseline = 'middle';
        const lbX = worldToCanvas(v, -TICK * 1.8 / sc);
        octx.fillText(label, lbX.x, lbX.y);

        // Y axis tick
        const py = worldToCanvas(0, v);
        const perpY = worldToCanvas(TICK / sc, v);
        octx.strokeStyle = 'rgba(79,195,247,0.6)';
        octx.beginPath();
        octx.moveTo(py.x - (perpY.x - py.x), py.y - (perpY.y - py.y));
        octx.lineTo(perpY.x, perpY.y);
        octx.stroke();
        const lbY = worldToCanvas(-TICK * 1.8 / sc, v);
        octx.fillStyle = 'rgba(79,195,247,0.8)';
        octx.fillText(label, lbY.x, lbY.y);
    }
}

function drawCalibration() {
    const pts = S.calPts;
    pts.forEach((p, i) => {
        octx.fillStyle = '#ffd700';
        octx.beginPath(); octx.arc(p.x, p.y, 6, 0, Math.PI*2); octx.fill();
        octx.fillStyle = '#000';
        octx.font = 'bold 11px sans-serif';
        octx.textAlign = 'center'; octx.textBaseline = 'middle';
        octx.fillText(i + 1, p.x, p.y);
    });
    if (pts.length === 2) {
        octx.strokeStyle = '#ffd700';
        octx.lineWidth = 2;
        octx.setLineDash([5, 4]);
        octx.beginPath();
        octx.moveTo(pts[0].x, pts[0].y);
        octx.lineTo(pts[1].x, pts[1].y);
        octx.stroke();
        octx.setLineDash([]);

        // End caps
        [[pts[0], pts[1]], [pts[1], pts[0]]].forEach(([a, b]) => {
            const ang = Math.atan2(b.y - a.y, b.x - a.x) + Math.PI / 2;
            octx.strokeStyle = '#ffd700';
            octx.lineWidth = 2;
            octx.beginPath();
            octx.moveTo(a.x + 6*Math.cos(ang), a.y + 6*Math.sin(ang));
            octx.lineTo(a.x - 6*Math.cos(ang), a.y - 6*Math.sin(ang));
            octx.stroke();
        });

        const mx = (pts[0].x + pts[1].x) / 2;
        const my = (pts[0].y + pts[1].y) / 2;
        const pxDist = dist2(pts[0], pts[1]);
        octx.fillStyle = '#ffd700';
        octx.font = '12px sans-serif';
        octx.textAlign = 'center'; octx.textBaseline = 'bottom';
        octx.fillText(`${pxDist.toFixed(1)} px`, mx, my - 8);
        if (S.calibrated) {
            octx.textBaseline = 'top';
            octx.fillText(`${S.calDist} ${S.unit}`, mx, my + 10);
        }
    }
}

function drawTrackPoints() {
    const pts = S.points;
    pts.forEach((p, i) => {
        // Connecting line
        if (i > 0) {
            const prev = pts[i - 1];
            octx.strokeStyle = 'rgba(255,215,0,0.45)';
            octx.lineWidth = 1.5;
            octx.beginPath();
            octx.moveTo(prev.cx, prev.cy);
            octx.lineTo(p.cx, p.cy);
            octx.stroke();
        }
        // Point
        octx.fillStyle = '#ffd700';
        octx.beginPath(); octx.arc(p.cx, p.cy, 4, 0, Math.PI*2); octx.fill();
        octx.strokeStyle = '#fff';
        octx.lineWidth = 1;
        octx.stroke();

        // Index label for first & last
        if (i === 0 || i === pts.length - 1) {
            octx.fillStyle = '#fff';
            octx.font = '10px sans-serif';
            octx.textAlign = 'left'; octx.textBaseline = 'bottom';
            octx.fillText(i + 1, p.cx + 5, p.cy - 3);
        }
    });
}

// ═══════════════════════════════════════════════════════
//  GRAPH DRAWING
// ═══════════════════════════════════════════════════════
function drawGraph() {
    const W = gcan.width, H = gcan.height;
    const pad = { t: 18, r: 16, b: 38, l: 52 };
    const pw = W - pad.l - pad.r;
    const ph = H - pad.t - pad.b;

    gctx.clearRect(0, 0, W, H);
    gctx.fillStyle = '#0d1117';
    gctx.fillRect(0, 0, W, H);

    const pts = S.points;
    if (!pts.length) {
        gctx.fillStyle = '#2a2a3a';
        gctx.font = '13px sans-serif';
        gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
        gctx.fillText('No data yet — start tracking', W/2, H/2);
        return;
    }

    const times = pts.map(p => p.time);
    const xs    = pts.map(p => p.wx);
    const ys    = pts.map(p => p.wy);
    const all   = [...xs, ...ys];

    const tMin = Math.min(...times), tMax = Math.max(...times);
    const vMin = Math.min(...all),   vMax = Math.max(...all);
    const tSpan = tMax - tMin || 1;
    const vSpan = vMax - vMin || 1;
    const t0 = tMin - tSpan*0.04, t1 = tMax + tSpan*0.12;
    const v0 = vMin - vSpan*0.10, v1 = vMax + vSpan*0.15;

    const tx = t => pad.l + (t - t0) / (t1 - t0) * pw;
    const ty = v => pad.t + (1 - (v - v0) / (v1 - v0)) * ph;

    // Grid
    gctx.strokeStyle = '#1a2233';
    gctx.lineWidth = 1;
    for (let i = 0; i <= 5; i++) {
        const gx = pad.l + i * pw / 5;
        const gy = pad.t + i * ph / 5;
        gctx.beginPath(); gctx.moveTo(gx, pad.t);    gctx.lineTo(gx, pad.t+ph); gctx.stroke();
        gctx.beginPath(); gctx.moveTo(pad.l, gy);    gctx.lineTo(pad.l+pw, gy); gctx.stroke();
    }

    // Zero line
    if (v0 < 0 && v1 > 0) {
        const zy = ty(0);
        gctx.strokeStyle = '#2a3a4a';
        gctx.setLineDash([3,3]);
        gctx.beginPath(); gctx.moveTo(pad.l, zy); gctx.lineTo(pad.l+pw, zy); gctx.stroke();
        gctx.setLineDash([]);
    }

    // Axes border
    gctx.strokeStyle = '#334';
    gctx.lineWidth = 1;
    gctx.strokeRect(pad.l, pad.t, pw, ph);

    // Tick labels
    gctx.fillStyle = '#667';
    gctx.font = '10px sans-serif';
    gctx.textBaseline = 'middle'; gctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
        const v = v0 + (v1-v0)*i/4;
        gctx.fillText(fmtNum(v1-(v1-v0)*i/4), pad.l-4, pad.t + i*ph/4);
    }
    gctx.textBaseline = 'top'; gctx.textAlign = 'center';
    for (let i = 0; i <= 4; i++) {
        const t = t0 + (t1-t0)*i/4;
        gctx.fillText(t.toFixed(2), pad.l + i*pw/4, pad.t+ph+4);
    }

    // Axis labels
    gctx.fillStyle = '#889';
    gctx.font = '11px sans-serif';
    gctx.textAlign = 'center'; gctx.textBaseline = 'bottom';
    gctx.fillText('Time (s)', pad.l + pw/2, H - 1);
    gctx.save();
    gctx.translate(11, pad.t + ph/2);
    gctx.rotate(-Math.PI/2);
    gctx.fillText(`Position (${S.unit})`, 0, 0);
    gctx.restore();

    // Plot lines then dots
    [
        { data: xs, color: '#e94560' },
        { data: ys, color: '#4fc3f7' },
    ].forEach(({ data, color }) => {
        if (pts.length > 1) {
            gctx.strokeStyle = color;
            gctx.lineWidth = 2;
            gctx.beginPath();
            pts.forEach((p, i) => {
                const x = tx(p.time), y = ty(data[i]);
                i === 0 ? gctx.moveTo(x, y) : gctx.lineTo(x, y);
            });
            gctx.stroke();
        }
        gctx.fillStyle = color;
        pts.forEach((p, i) => {
            gctx.beginPath();
            gctx.arc(tx(p.time), ty(data[i]), 3.5, 0, Math.PI*2);
            gctx.fill();
        });
    });
}

// ═══════════════════════════════════════════════════════
//  DATA TABLE
// ═══════════════════════════════════════════════════════
function updateDataTable() {
    const tbody = document.getElementById('data-tbody');
    tbody.innerHTML = '';
    S.points.forEach((p, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i+1}</td><td>${p.time.toFixed(3)}</td><td>${p.wx.toFixed(3)}</td><td>${p.wy.toFixed(3)}</td>`;
        tbody.appendChild(tr);
    });
    const ds = document.getElementById('data-section');
    ds.scrollTop = ds.scrollHeight;
}
function updateTableHeader() {
    document.getElementById('th-x').textContent = `X (${S.unit})`;
    document.getElementById('th-y').textContent = `Y (${S.unit})`;
}

// ═══════════════════════════════════════════════════════
//  STATUS BAR
// ═══════════════════════════════════════════════════════
function updateStatus() {
    const totalFrames = S.videoLoaded ? Math.round(S.videoDuration * S.fps) : 0;
    document.getElementById('st-frame').textContent  = S.videoLoaded ? `${S.frameIndex} / ${totalFrames}` : '—';
    document.getElementById('st-time').textContent   = S.videoLoaded ? `${(S.frameIndex / S.fps).toFixed(3)} s` : '—';
    document.getElementById('st-scale').textContent  = S.calibrated  ? `${S.scale.toFixed(2)} px/${S.unit}` : 'Not calibrated';
    document.getElementById('st-pts').textContent    = S.points.length;
}

// ═══════════════════════════════════════════════════════
//  GRAPH CANVAS RESIZE
// ═══════════════════════════════════════════════════════
const graphWrap = document.getElementById('graph-wrap');
const ro = new ResizeObserver(() => {
    gcan.width  = graphWrap.clientWidth;
    gcan.height = graphWrap.clientHeight;
    drawGraph();
});
ro.observe(graphWrap);

// ═══════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════
function hexToRGBA(hex, a) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
}
function fmtNum(v) {
    if (Math.abs(v) >= 10000 || (Math.abs(v) < 0.01 && v !== 0)) return v.toExponential(1);
    return parseFloat(v.toPrecision(4)) + '';
}

// Initial draw
drawGraph();
updateStatus();
</script>
