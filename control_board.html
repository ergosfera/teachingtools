<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control Board</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ffffff'/><circle cx='16' cy='16' r='10' stroke='%230969da' stroke-width='2' fill='%23e8f0fe'/><line x1='16' y1='16' x2='16' y2='9' stroke='%230969da' stroke-width='2.2' stroke-linecap='round'/><line x1='16' y1='16' x2='21' y2='19' stroke='%231a7f37' stroke-width='2' stroke-linecap='round'/><circle cx='16' cy='16' r='1.8' fill='%230969da'/><circle cx='16' cy='7' r='1' fill='%230969da'/><circle cx='16' cy='25' r='1' fill='%230969da'/><circle cx='7' cy='16' r='1' fill='%230969da'/><circle cx='25' cy='16' r='1' fill='%230969da'/></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --holiday: #f85149;
      --radius: 12px;
    }

    body.light {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #0969da;
      --green: #1a7f37;
      --red: #cf222e;
      --yellow: #9a6700;
      --holiday: #cf222e;
    }
    body.light .ti-datetime    { color-scheme: light; }
    body.light #todo-priority,
    body.light #todo-input     { background: var(--bg); }
    body.light .timer-instance { background: #edf0f2; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 100vh;
      overflow: hidden;
    }

    h2 {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    /* ══ CLOCK (full width) ══ */
    #clock-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    #clock-display {
      font-size: clamp(2.6rem, 6vw, 5.5rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -2px;
    }
    #date-display {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 500;
    }

    /* ══ MAIN 4-COLUMN LAYOUT ══ */
    .columns {
      display: grid;
      grid-template-columns: 20fr 30fr 25fr 25fr;
      gap: 14px;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    /* ══ TASKS column ══ */
    #todo-card { display: flex; flex-direction: column; overflow: hidden; }

    #todo-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    #todo-input {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.82rem;
      outline: none;
      transition: border-color .2s;
    }
    #todo-input:focus { border-color: var(--accent); }
    #todo-priority {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      padding: 6px 6px;
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
    }
    .btn-blue { background: var(--accent); color: #0d1117; border: none; border-radius: 7px;
                font-size: 0.82rem; font-weight: 700; padding: 6px 12px; cursor: pointer; }
    .btn-blue:active { transform: scale(0.95); }

    #todo-list { overflow-y: auto; flex: 1; min-height: 0; }
    #todo-list::-webkit-scrollbar { width: 3px; }
    #todo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .todo-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 2px;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
    .todo-text { flex: 1; min-width: 0; word-break: break-word; }
    .todo-text.done { text-decoration: line-through; color: var(--muted); }
    .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .p-high   { background: var(--red); }
    .p-medium { background: var(--yellow); }
    .p-low    { background: var(--green); }
    .todo-delete {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.95rem; line-height: 1; padding: 0 2px; opacity: 0;
      transition: opacity .15s, color .15s;
    }
    .todo-item:hover .todo-delete { opacity: 1; }
    .todo-delete:hover { color: var(--red); }

    .todo-edit-input {
      flex: 1; min-width: 0;
      background: transparent; border: none;
      border-bottom: 1px solid var(--accent);
      color: var(--text); font-size: 0.82rem; font-family: inherit;
      outline: none; padding: 0;
    }

    .todo-drag {
      cursor: grab; color: var(--border); font-size: 0.85rem;
      padding: 0 2px; opacity: 0; flex-shrink: 0; line-height: 1;
      transition: opacity .15s, color .15s; user-select: none;
    }
    .todo-item:hover .todo-drag { opacity: 1; }
    .todo-drag:hover { color: var(--muted); }
    .todo-item.dragging { opacity: 0.35; }
    .todo-item.drag-over-top    { border-top: 2px solid var(--accent); }
    .todo-item.drag-over-bottom { border-bottom: 2px solid var(--accent); }

    #todo-stats { font-size: 0.7rem; color: var(--muted); margin-top: 8px; text-align: right; }

    /* ══ TIMERS column ══ */
    #timers-card { display: flex; flex-direction: column; overflow: hidden; }
    #timers-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .btn-ghost {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; font-size: 0.72rem; font-weight: 600; padding: 3px 9px; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    #timers-scroll { overflow-y: auto; flex: 1; min-height: 0; padding-right: 2px; }
    #timers-scroll::-webkit-scrollbar { width: 3px; }
    #timers-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .timer-instance {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 13px;
      margin-bottom: 9px;
    }
    .timer-instance:last-child { margin-bottom: 0; }

    .ti-top { display: flex; gap: 7px; align-items: center; margin-bottom: 7px; }
    .ti-name {
      flex: 1; min-width: 0;
      background: transparent; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text); font-size: 0.82rem; font-weight: 600;
      outline: none; padding: 2px 4px;
      transition: border-color .2s;
    }
    .ti-name:focus { border-color: var(--accent); }
    .ti-name::placeholder { color: var(--muted); font-weight: 400; }

    .ti-datetime {
      background: transparent; border: 1px solid var(--border); border-radius: 5px;
      color: var(--muted); font-size: 0.7rem; padding: 3px 4px;
      outline: none; cursor: pointer; transition: border-color .2s; color-scheme: dark;
    }
    .ti-datetime:focus { border-color: var(--accent); }

    .ti-del {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 1px; opacity: 0;
      transition: opacity .15s, color .15s; flex-shrink: 0;
    }
    .timer-instance:hover .ti-del { opacity: 1; }
    .ti-del:hover { color: var(--red); }

    .ti-countdown {
      font-size: 1.35rem; font-weight: 800; font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px; color: var(--accent); text-align: center;
    }
    .ti-countdown.urgent  { color: var(--red); }
    .ti-countdown.warning { color: var(--yellow); }
    .ti-countdown.done    { color: var(--green); font-size: 0.95rem; }
    .ti-countdown.empty   { color: var(--border); font-size: 0.82rem; }

    .ti-label {
      font-size: 0.62rem; color: var(--muted); text-align: center;
      margin-top: 2px; letter-spacing: 0.04em;
    }

    /* progress bar */
    .ti-bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 9px;
      overflow: hidden;
    }
    .ti-bar-fill {
      height: 100%;
      width: 100%;
      border-radius: 3px;
      background: var(--green);
      transform-origin: left center;
      transition: width 0.9s linear, background 0.4s ease;
    }

    /* ══ CALENDAR column ══ */
    .cal-column {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }
    .cal-column .card {
      flex: 1; min-height: 0; overflow: hidden;
      display: flex; flex-direction: column;
    }

    .cal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .cal-header h2 { margin-bottom: 0; }
    .cal-today-btn {
      background: none; border: 1px solid var(--border); color: var(--accent);
      border-radius: 5px; font-size: 0.65rem; font-weight: 700; padding: 2px 8px;
      cursor: pointer; transition: background .15s, border-color .15s;
      letter-spacing: 0.04em;
    }
    .cal-today-btn:hover { background: var(--border); border-color: var(--accent); }

    .cal-nav {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .cal-nav button {
      background: none; border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; width: 24px; height: 24px; cursor: pointer;
      font-size: 0.95rem; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .cal-nav button:hover { background: var(--border); }
    .cal-month-label { font-weight: 600; font-size: 0.85rem; }

    .cal-grid {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      gap: 2px;
      text-align: center;
    }
    .cal-grid .day-name {
      font-size: 0.62rem; color: var(--muted); font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-grid .day-name.sunday-name { color: var(--holiday); }
    .cal-grid .day {
      font-size: 0.78rem; border-radius: 4px; cursor: default; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }
    .cal-grid .day.in-month      { color: var(--text); }
    .cal-grid .day.sunday        { color: var(--holiday); font-weight: 600; }
    .cal-grid .day.holiday       { color: var(--holiday); font-weight: 700; }
    .cal-grid .day.today         { background: var(--accent); color: #fff; font-weight: 700; }
    .cal-grid .day.today.sunday,
    .cal-grid .day.today.holiday { color: #fff; }

    /* ══ NOTEPADS column ══ */
    .notepads-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }
    .notepad-card {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; padding: 13px;
    }
    .notepad-title {
      background: transparent; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text); font-size: 0.82rem; font-weight: 700;
      outline: none; padding: 2px 3px 5px; margin-bottom: 8px; width: 100%;
      transition: border-color .2s;
    }
    .notepad-title:focus { border-color: var(--accent); }
    .notepad-title::placeholder { color: var(--border); font-weight: 400; }
    .notepad-body {
      flex: 1; min-height: 0;
      background: transparent; border: none; color: var(--text);
      font-size: 0.78rem; line-height: 1.55; resize: none; outline: none;
      font-family: inherit;
    }
    .notepad-body::placeholder { color: var(--border); }

    /* ══ TOOLBAR ══ */
    #toolbar {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 8px; padding-bottom: 2px;
    }
    .btn-toolbar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 0.75rem; font-weight: 600;
      padding: 6px 13px; cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-toolbar:hover { border-color: var(--accent); color: var(--accent); }
    .btn-toolbar.import-btn { position: relative; overflow: hidden; }
    .btn-toolbar.import-btn input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0;
    }
    #theme-toggle {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 13px; cursor: pointer;
      font-size: 0.75rem; font-weight: 600; color: var(--muted);
      transition: border-color .2s, color .2s; user-select: none;
    }
    #theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ══ SCROLLBAR GLOBAL ══ */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- CLOCK -->
<div class="card" id="clock-card">
  <div id="clock-display">00:00:00</div>
  <div id="date-display">Loading…</div>
</div>

<!-- MAIN COLUMNS -->
<div class="columns">

  <!-- COL 1 · Tasks (20%) -->
  <div class="card" id="todo-card">
    <h2>Tasks</h2>
    <div id="todo-input-row">
      <input id="todo-input" type="text" placeholder="Add a task…" />
      <select id="todo-priority">
        <option value="high">&#128308;</option>
        <option value="medium" selected>&#128992;</option>
        <option value="low">&#128994;</option>
      </select>
      <button class="btn-blue" id="btn-add-todo">+</button>
    </div>
    <div id="todo-list"></div>
    <div id="todo-stats"></div>
  </div>

  <!-- COL 2 · Countdown Timers (30%) -->
  <div class="card" id="timers-card">
    <div id="timers-header">
      <h2 style="margin-bottom:0">Countdown Timers</h2>
      <button class="btn-ghost" id="btn-add-timer">+ Add</button>
    </div>
    <div id="timers-scroll"><div id="timers-list"></div></div>
  </div>

  <!-- COL 3 · Calendars (25%) -->
  <div class="cal-column">
    <div class="card" id="cal-card-1">
      <div class="cal-header">
        <h2>Calendar</h2>
        <button class="cal-today-btn" id="btn-cal-today">Today</button>
      </div>
      <div class="cal-nav">
        <button id="cal1-prev">&#8249;</button>
        <span class="cal-month-label" id="cal-label-1"></span>
        <button id="cal1-next">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid-1"></div>
    </div>
    <div class="card" id="cal-card-2">
      <div class="cal-header">
        <h2>Next Month</h2>
      </div>
      <div class="cal-nav">
        <button id="cal2-prev">&#8249;</button>
        <span class="cal-month-label" id="cal-label-2"></span>
        <button id="cal2-next">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid-2"></div>
    </div>
  </div>

  <!-- COL 4 · 6 Notepads (25%) -->
  <div class="notepads-col" id="notepads-col"></div>

</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="btn-toolbar" id="btn-export">&#8595; Export</button>
  <label class="btn-toolbar import-btn">
    &#8593; Import
    <input type="file" id="file-import" accept=".json" />
  </label>
  <div id="theme-toggle">
    <span id="theme-icon">&#9788;</span>
    <span id="theme-label">Light</span>
  </div>
</div>

<script>
/* ══════════════ CLOCK ══════════════ */
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function updateClock() {
  const n = new Date();
  document.getElementById('clock-display').textContent =
    [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
  document.getElementById('date-display').textContent =
    `${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 1000);


/* ══════════════ COLOMBIAN HOLIDAYS ══════════════ */
function easterDate(y) {
  const a=y%19, b=Math.floor(y/100), c=y%100, d=Math.floor(b/4), e=b%4;
  const f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30, i=Math.floor(c/4), k=c%4;
  const l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31), da=((h+l-7*m+114)%31)+1;
  return new Date(y, mo-1, da);
}
function nextMonday(date) {
  const d = new Date(date.getTime()), dow = d.getDay();
  if (dow === 1) return d;
  d.setDate(d.getDate() + ((8 - dow) % 7 || 7));
  return d;
}
const _hCache = {};
function colombianHolidays(year) {
  if (_hCache[year]) return _hCache[year];
  const set = new Set();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const fixed = (m,d) => set.add(fmt(new Date(year,m-1,d)));
  const em    = (m,d) => set.add(fmt(nextMonday(new Date(year,m-1,d))));
  const dt    = d => set.add(fmt(d));
  const MS    = 86400000;
  fixed(1,1); fixed(5,1); fixed(7,20); fixed(8,7); fixed(12,8); fixed(12,25);
  em(1,6); em(3,19); em(6,29); em(8,15); em(10,12); em(11,1); em(11,11);
  const e = easterDate(year);
  dt(new Date(e.getTime()-3*MS)); dt(new Date(e.getTime()-2*MS));
  dt(nextMonday(new Date(e.getTime()+39*MS)));
  dt(nextMonday(new Date(e.getTime()+60*MS)));
  dt(nextMonday(new Date(e.getTime()+68*MS)));
  return (_hCache[year] = set);
}


/* ══════════════ CALENDARS ══════════════ */
function renderCalendar(gridId, labelId, year, month) {
  const grid  = document.getElementById(gridId);
  const label = document.getElementById(labelId);
  label.textContent = `${MONTHS[month]} ${year}`;
  grid.innerHTML = '';

  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'day-name' + (i===0 ? ' sunday-name' : '');
    el.textContent = d;
    grid.appendChild(el);
  });

  const today = new Date();
  const firstDay    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();
  const holidays    = colombianHolidays(year);

  for (let i = firstDay-1; i >= 0; i--) {
    const el = document.createElement('div'); el.className = 'day'; el.textContent = daysInPrev-i; grid.appendChild(el);
  }
  for (let dd = 1; dd <= daysInMonth; dd++) {
    const el = document.createElement('div');
    const dow = new Date(year, month, dd).getDay();
    const ds  = `${year}-${String(month+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const isToday = dd===today.getDate() && month===today.getMonth() && year===today.getFullYear();
    let cls = 'day in-month';
    if (dow===0)            cls += ' sunday';
    if (holidays.has(ds))   cls += ' holiday';
    if (isToday)            cls += ' today';
    el.className = cls; el.textContent = dd;
    if (holidays.has(ds) && !isToday) el.title = 'Colombian holiday';
    grid.appendChild(el);
  }
  const rem = (firstDay + daysInMonth) % 7;
  for (let dd = 1; dd <= (rem===0?0:7-rem); dd++) {
    const el = document.createElement('div'); el.className = 'day'; el.textContent = dd; grid.appendChild(el);
  }
}

const _now = new Date();
let cal1Y = _now.getFullYear(), cal1M = _now.getMonth();
let cal2Y = cal1Y,              cal2M = cal1M + 1;
if (cal2M > 11) { cal2M = 0; cal2Y++; }

renderCalendar('cal-grid-1','cal-label-1', cal1Y, cal1M);
renderCalendar('cal-grid-2','cal-label-2', cal2Y, cal2M);

document.getElementById('cal1-prev').addEventListener('click', () => {
  if (--cal1M < 0)  { cal1M = 11; cal1Y--; }
  renderCalendar('cal-grid-1','cal-label-1', cal1Y, cal1M);
});
document.getElementById('cal1-next').addEventListener('click', () => {
  if (++cal1M > 11) { cal1M = 0;  cal1Y++; }
  renderCalendar('cal-grid-1','cal-label-1', cal1Y, cal1M);
});
document.getElementById('cal2-prev').addEventListener('click', () => {
  if (--cal2M < 0)  { cal2M = 11; cal2Y--; }
  renderCalendar('cal-grid-2','cal-label-2', cal2Y, cal2M);
});
document.getElementById('cal2-next').addEventListener('click', () => {
  if (++cal2M > 11) { cal2M = 0;  cal2Y++; }
  renderCalendar('cal-grid-2','cal-label-2', cal2Y, cal2M);
});
document.getElementById('btn-cal-today').addEventListener('click', () => {
  const t = new Date();
  cal1Y = t.getFullYear(); cal1M = t.getMonth();
  cal2Y = cal1Y; cal2M = cal1M + 1;
  if (cal2M > 11) { cal2M = 0; cal2Y++; }
  renderCalendar('cal-grid-1','cal-label-1', cal1Y, cal1M);
  renderCalendar('cal-grid-2','cal-label-2', cal2Y, cal2M);
});


/* ══════════════ COUNTDOWN TIMERS ══════════════ */
function uid() { return Math.random().toString(36).slice(2,9); }
function loadTimers() { try { return JSON.parse(localStorage.getItem('cb_timers')||'[]'); } catch { return []; } }
function saveTimers() { localStorage.setItem('cb_timers', JSON.stringify(timerData)); }

let timerData = loadTimers();
if (!timerData.length) {
  timerData = Array.from({length:3}, () => ({id:uid(), name:'', datetime:'', startedAt:null}));
  saveTimers();
}
// back-fill startedAt for existing timers that have a datetime but no startedAt
timerData.forEach(t => { if (t.datetime && !t.startedAt) { t.startedAt = Date.now(); } });
saveTimers();

function fmtCountdown(ms) {
  const s=Math.floor(ms/1000), D=Math.floor(s/86400),
        H=Math.floor((s%86400)/3600), M=Math.floor((s%3600)/60), S=s%60;
  const p = n => String(n).padStart(2,'0');
  if (D>0) return { text:`${D}d ${p(H)}:${p(M)}:${p(S)}`, label:'days · hh:mm:ss',
                    level: D<3?'warning':'ok' };
  return   { text:`${p(H)}:${p(M)}:${p(S)}`, label:'hh : mm : ss',
             level: H<1?'urgent': H<6?'warning':'ok' };
}

function refreshCountdown(wrap, t) {
  const cEl  = wrap.querySelector('.ti-countdown');
  const lEl  = wrap.querySelector('.ti-label');
  const fill = wrap.querySelector('.ti-bar-fill');
  const track= wrap.querySelector('.ti-bar-track');

  if (!t.datetime) {
    cEl.className = 'ti-countdown empty'; cEl.textContent = '— : — : —';
    lEl.textContent = 'set a date & time above';
    track.style.visibility = 'hidden';
    return;
  }
  track.style.visibility = 'visible';

  const target = new Date(t.datetime).getTime();
  const now    = Date.now();
  const diff   = target - now;

  if (diff <= 0) {
    cEl.className = 'ti-countdown done'; cEl.textContent = 'Done!';
    lEl.textContent = new Date(t.datetime).toLocaleString();
    fill.style.width = '0%'; fill.style.background = 'var(--red)';
    return;
  }

  const fmt = fmtCountdown(diff);
  cEl.textContent = fmt.text;
  lEl.textContent = new Date(t.datetime).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

  // progress bar: shrinks left-to-right from 100% → 0%
  const startedAt = t.startedAt || now;
  const total     = target - startedAt;
  const pct       = total > 0 ? Math.max(0, Math.min(100, (diff / total) * 100)) : 100;
  fill.style.width = pct + '%';

  // bar and countdown text share the same color
  const barColor = pct <= 7 ? 'var(--red)' : pct <= 25 ? 'var(--yellow)' : 'var(--green)';
  fill.style.background = barColor;
  const colorClass = pct <= 7 ? 'urgent' : pct <= 25 ? 'warning' : '';
  cEl.className = `ti-countdown ${colorClass}`;
  cEl.style.color = barColor;
}

function sortedTimers() {
  const now = Date.now();
  return timerData
    .map((t, i) => ({ t, i }))
    .sort((a, b) => {
      const rank = t => {
        if (!t.datetime) return 3e15;           // empty → last
        const diff = new Date(t.datetime).getTime() - now;
        if (diff <= 0) return 2e15 + Math.abs(diff); // done → second-to-last (most recent done first)
        return diff;                             // active → ascending remaining time
      };
      return rank(a.t) - rank(b.t);
    });
}

function renderTimers() {
  const list = document.getElementById('timers-list');
  list.innerHTML = '';
  sortedTimers().forEach(({ t, i }) => {
    const wrap = document.createElement('div'); wrap.className = 'timer-instance';
    wrap.dataset.timerIdx = i; // store original index for tick

    const top = document.createElement('div'); top.className = 'ti-top';

    const nameIn = document.createElement('input');
    nameIn.className = 'ti-name'; nameIn.type = 'text';
    nameIn.placeholder = `Event ${i+1}`; nameIn.value = t.name;
    nameIn.addEventListener('input', () => { timerData[i].name = nameIn.value; saveTimers(); });

    const dtIn = document.createElement('input');
    dtIn.className = 'ti-datetime'; dtIn.type = 'datetime-local';
    if (t.datetime) {
      dtIn.value = t.datetime;
    } else {
      const d = new Date(); d.setSeconds(0,0);
      dtIn.value = d.toISOString().slice(0,16);
    }
    dtIn.addEventListener('change', () => {
      timerData[i].datetime  = dtIn.value;
      timerData[i].startedAt = dtIn.value ? Date.now() : null;
      saveTimers(); renderTimers();
    });

    const del = document.createElement('button'); del.className = 'ti-del'; del.textContent = '×';
    del.addEventListener('click', () => { timerData.splice(i,1); saveTimers(); renderTimers(); });

    top.append(nameIn, dtIn, del);

    const cEl = document.createElement('div'); cEl.className = 'ti-countdown empty'; cEl.textContent = '— : — : —';
    const lEl = document.createElement('div'); lEl.className = 'ti-label'; lEl.textContent = 'set a date & time above';

    const track = document.createElement('div'); track.className = 'ti-bar-track'; track.style.visibility = 'hidden';
    const fill  = document.createElement('div'); fill.className = 'ti-bar-fill';
    track.appendChild(fill);

    wrap.append(top, cEl, lEl, track);
    list.appendChild(wrap);
    refreshCountdown(wrap, t);
  });
}

function updateTabTitle() {
  const now = Date.now();
  let nearest = null, minDiff = Infinity;
  timerData.forEach(t => {
    if (!t.datetime) return;
    const diff = new Date(t.datetime).getTime() - now;
    if (diff > 0 && diff < minDiff) { minDiff = diff; nearest = t; }
  });
  if (nearest) {
    const fmt = fmtCountdown(minDiff);
    document.title = `${nearest.name || 'Timer'} · ${fmt.text}`;
  } else {
    document.title = 'Control Board';
  }
}

renderTimers();
setInterval(() => {
  document.querySelectorAll('.timer-instance').forEach(wrap => {
    const idx = parseInt(wrap.dataset.timerIdx);
    if (!isNaN(idx) && timerData[idx]) refreshCountdown(wrap, timerData[idx]);
  });
  updateTabTitle();
}, 1000);
updateTabTitle();

document.getElementById('btn-add-timer').addEventListener('click', () => {
  timerData.push({id:uid(), name:'', datetime:'', startedAt:null});
  saveTimers(); renderTimers();
});


/* ══════════════ TASKS ══════════════ */
function loadTasks() { try { return JSON.parse(localStorage.getItem('cb_tasks')||'[]'); } catch { return []; } }
function saveTasks()  { localStorage.setItem('cb_tasks', JSON.stringify(tasks)); }

let tasks = loadTasks();
let dragSrcIdx = null;

function renderTodos() {
  const list = document.getElementById('todo-list'); list.innerHTML = '';

  tasks.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'todo-item';
    item.draggable = true;

    /* drag handle */
    const handle = document.createElement('span');
    handle.className = 'todo-drag';
    handle.textContent = '⠿';

    const dot  = document.createElement('div');  dot.className = `priority-dot p-${t.priority}`;
    const cb   = document.createElement('input'); cb.type = 'checkbox'; cb.checked = t.done;
    cb.addEventListener('change', () => { tasks[i].done = cb.checked; saveTasks(); renderTodos(); });

    const span = document.createElement('span');
    span.className = 'todo-text' + (t.done?' done':'');
    span.textContent = t.text;
    span.title = 'Click to edit';
    span.addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'todo-edit-input'; inp.value = t.text;
      span.replaceWith(inp); inp.focus(); inp.select();
      const commit = () => {
        const v = inp.value.trim();
        if (v && v !== t.text) { tasks[i].text = v; saveTasks(); }
        renderTodos();
      };
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { renderTodos(); }
      });
    });

    const del  = document.createElement('button'); del.className = 'todo-delete'; del.textContent = '×';
    del.addEventListener('click', () => { tasks.splice(i,1); saveTasks(); renderTodos(); });

    /* ── drag events ── */
    item.addEventListener('dragstart', e => {
      dragSrcIdx = i;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      dragSrcIdx = null;
      document.querySelectorAll('.todo-item').forEach(el => {
        el.classList.remove('dragging','drag-over-top','drag-over-bottom');
      });
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      document.querySelectorAll('.todo-item').forEach(el => {
        el.classList.remove('drag-over-top','drag-over-bottom');
      });
      const rect = item.getBoundingClientRect();
      const mid  = rect.top + rect.height / 2;
      item.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
    });
    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over-top','drag-over-bottom');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      const rect   = item.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      const moved  = tasks.splice(dragSrcIdx, 1)[0];
      const target = before ? i : i; // recalculate after splice
      const newIdx = dragSrcIdx < i
        ? (before ? i - 1 : i)
        : (before ? i     : i + 1);
      tasks.splice(newIdx, 0, moved);
      saveTasks(); renderTodos();
    });

    item.append(handle, dot, cb, span, del);
    list.appendChild(item);
  });

  const done = tasks.filter(t=>t.done).length;
  document.getElementById('todo-stats').textContent =
    tasks.length ? `${done} / ${tasks.length} done` : 'No tasks yet';
}

document.getElementById('btn-add-todo').addEventListener('click', addTask);
document.getElementById('todo-input').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
function addTask() {
  const text = document.getElementById('todo-input').value.trim(); if (!text) return;
  tasks.push({text, priority: document.getElementById('todo-priority').value, done: false});
  saveTasks(); document.getElementById('todo-input').value = ''; renderTodos();
}
renderTodos();


/* ══════════════ NOTEPADS (6) ══════════════ */
function loadNotes() {
  try {
    const s = JSON.parse(localStorage.getItem('cb_notes')||'null');
    if (Array.isArray(s) && s.length === 4) return s;
    // migrate from any previous size: keep first 4, pad if fewer
    if (Array.isArray(s)) {
      const trimmed = s.slice(0, 4);
      while (trimmed.length < 4) trimmed.push({title:'', body:''});
      return trimmed;
    }
  } catch {}
  return Array.from({length:4}, () => ({title:'', body:''}));
}
function saveNote(i, field, value) {
  const notes = loadNotes(); notes[i][field] = value;
  localStorage.setItem('cb_notes', JSON.stringify(notes));
}
function buildNotepads(notes) {
  const col = document.getElementById('notepads-col'); col.innerHTML = '';
  notes.forEach((note, i) => {
    const card = document.createElement('div'); card.className = 'card notepad-card';
    const title = document.createElement('input');
    title.className = 'notepad-title'; title.type = 'text';
    title.placeholder = `Note ${i+1}`; title.value = note.title;
    title.addEventListener('input', () => saveNote(i,'title',title.value));
    const body = document.createElement('textarea');
    body.className = 'notepad-body'; body.placeholder = 'Write here…'; body.value = note.body;
    body.addEventListener('input', () => saveNote(i,'body',body.value));
    card.append(title, body); col.appendChild(card);
  });
}
buildNotepads(loadNotes());


/* ══════════════ THEME ══════════════ */
function applyTheme(light) {
  document.body.classList.toggle('light', light);
  document.getElementById('theme-icon').textContent  = light ? '☽' : '☀';
  document.getElementById('theme-label').textContent = light ? 'Dark' : 'Light';
  localStorage.setItem('cb_theme', light ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('cb_theme') === 'light');
document.getElementById('theme-toggle').addEventListener('click', () =>
  applyTheme(!document.body.classList.contains('light')));


/* ══════════════ EXPORT / IMPORT ══════════════ */
document.getElementById('btn-export').addEventListener('click', () => {
  const data = {
    cb_tasks:  localStorage.getItem('cb_tasks')  || '[]',
    cb_timers: localStorage.getItem('cb_timers') || '[]',
    cb_notes:  localStorage.getItem('cb_notes')  || '[]',
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = `control_board_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
});

document.getElementById('file-import').addEventListener('change', function () {
  const file = this.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.cb_tasks)  localStorage.setItem('cb_tasks',  data.cb_tasks);
      if (data.cb_timers) localStorage.setItem('cb_timers', data.cb_timers);
      if (data.cb_notes)  localStorage.setItem('cb_notes',  data.cb_notes);
      tasks = loadTasks(); renderTodos();
      timerData = loadTimers(); renderTimers();
      buildNotepads(loadNotes());
      alert('Imported successfully!');
    } catch { alert('Invalid file.'); }
    this.value = '';
  };
  reader.readAsText(file);
});
</script>
